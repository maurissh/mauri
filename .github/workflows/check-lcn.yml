name: Controlla aggiornamenti LCN tivusat

# Gira una volta a settimana (lunedi mattina) e si puo' lanciare a mano.
on:
  schedule:
    - cron: "0 6 * * 1"      # ogni lunedi alle 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write              # serve per aprire la issue di report

jobs:
  check-lcn:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Esegue il controllo. Non usa --apply: non tocca lcn_tivusat.json,
      # genera solo lcn_changes.md con le differenze.
      # continue-on-error: se il forum cambia formato lo script esce con codice
      # != 0, ma vogliamo comunque proseguire per segnalarlo nella issue.
      - name: Controlla differenze LCN
        continue-on-error: true
        run: python sync_lcn.py

      # Decide se aprire una issue, leggendo il contenuto del report.
      # Tutta la logica sta in bash: niente contenuto interpolato in JS.
      - name: Valuta il report
        id: gate
        run: |
          if [ ! -f lcn_changes.md ]; then
            # nessun report: errore di rete o pagina cambiata -> avvisa
            echo "should_open=true" >> "$GITHUB_OUTPUT"
            printf 'Il controllo automatico non ha prodotto un report.\n' > issue_body.md
            printf 'Probabile causa: la pagina del forum ha cambiato formato o non era raggiungibile.\n' >> issue_body.md
            printf 'Controlla manualmente la fonte e il parser in sync_lcn.py.\n' >> issue_body.md
          elif grep -q "Nessuna differenza" lcn_changes.md; then
            # tutto invariato: non disturbare
            echo "should_open=false" >> "$GITHUB_OUTPUT"
          else
            # ci sono modifiche reali: usa il report come corpo della issue
            echo "should_open=true" >> "$GITHUB_OUTPUT"
            cp lcn_changes.md issue_body.md
            {
              printf '\n---\n'
              printf "_Controllo automatico settimanale. La tabella lcn_tivusat.json NON e' stata modificata._\n"
              printf '_Aggiorna a mano i numeri/canali, usando i nomi nella forma di iptv-org._\n'
            } >> issue_body.md
          fi

      # Apre la issue. Il corpo viene letto dal file issue_body.md con fs:
      # nessun contenuto del report finisce mai dentro il codice JavaScript,
      # quindi caratteri come accenti, backtick o "Rai" non possono romperlo.
      - name: Apri issue se ci sono modifiche
        if: steps.gate.outputs.should_open == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('issue_body.md', 'utf8');
            const date = new Date().toISOString().slice(0, 10);
            const title = `Aggiornamento numerazione LCN tivùsat — ${date}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['lcn-update']
            });
