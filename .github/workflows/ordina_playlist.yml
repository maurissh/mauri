name: Ordina playlist per LCN Tivùsat

on:
  schedule:
    - cron: '0 6 * * *'   # ogni giorno alle 06:00 UTC
  workflow_dispatch:       # permette l'esecuzione manuale

jobs:
  ordina:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Esegui script di ordinamento
        run: python ordina_tivusat.py > tivusat_ordinato.m3u

      - name: Carica playlist ordinata come artifact
        uses: actions/upload-artifact@v4
        with:
          name: playlist-ordinata
          path: tivusat_ordinato.m3u

      # Opzionale: committa il file ordinato nello stesso repo
      - name: Commit e push del file ordinato
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add tivusat_ordinato.m3u
          git diff --staged --quiet || git commit -m "Aggiornamento automatico playlist ordinata"
          git push
