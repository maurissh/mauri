name: Daily Sync Canali TivùSat

on:
  schedule:
    - cron: '0 0 * * *'   # ogni giorno a mezzanotte UTC
  workflow_dispatch:      # permette esecuzione manuale

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # per fare commit automatici
    steps:
      - name: Checkout del repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installa dipendenze
        run: pip install requests

      - name: Esegui script di sincronizzazione
        run: python scripts/sync_channels.py

      - name: Commit e push delle modifiche
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add italian_channels_tivusat.m3u
          git diff --staged --quiet || (git commit -m "Aggiornamento automatico canali [skip ci]" && git push)
